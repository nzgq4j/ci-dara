name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  deps-and-types:
    name: Lockfile, types & dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm before setup-node so the npm cache can resolve the pnpm store.
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # DARA-016: a drifted/edited lockfile fails the build here.
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      # DARA-006/015: fail on high+ severity advisories in production deps.
      - name: Dependency audit (high+)
        run: pnpm audit --prod --audit-level high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so historical leaks are caught
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub *organization* accounts.

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # DARA-015: software bill of materials from the lockfile (Syft reads
      # pnpm-lock.yaml). Uploaded as a build artifact for supply-chain assurance.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: dara-sbom.cyclonedx.json
